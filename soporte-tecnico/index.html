<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Dragones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <div class="formulario-card">
            <h2>🐉 Registro de Dragones</h2>

            <!-- Nombre -->
            <div class="campo">
                <label for="nombre">Nombre del Dragón:</label>
                <input type="text" id="nombre" placeholder="Ej: Smaug">
            </div>

            <!-- Correo -->
            <div class="campo">
                <label for="correo">Correo del Guardián:</label>
                <input type="email" id="correo" placeholder="guardian@reino.com">
            </div>

            <!-- Tipo -->
            <div class="campo">
                <label for="tipo">Tipo de Dragón:</label>
                <select id="tipo">
                    <option value="Fuego">🔥 Dragón de Fuego</option>
                    <option value="Hielo">❄️ Dragón de Hielo</option>
                    <option value="Celestial">✨ Dragón Celestial</option>
                    <option value="Sombra">🌑 Dragón de Sombra</option>
                    <option value="Ancestral">👑 Dragón Ancestral</option>
                </select>
            </div>

            <!-- Mensaje -->
            <div class="campo">
                <label for="mensaje">Descripción del Dragón:</label>
                <textarea id="mensaje" rows="5" placeholder="Describe sus habilidades..."></textarea>
            </div>

            <!-- Botones -->
            <div class="botones">
                <button id="btnEnviar">Registrar</button>
                <button id="btnLimpiar" type="button">Limpiar</button>
            </div>

            <!-- Mensajes -->
            <p id="mensajeError"></p>

        </div>

        <!-- LISTA DINÁMICA -->
        <div class="lista">
            <h3>📜 Dragones Registrados</h3>
            <ul id="listaDragones"></ul>
        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
