<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Dragones</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <div class="formulario-card">
            <h2>🐉 Registro de Dragones</h2>

            <form id="formulario">
                <div class="campo">
                    <label for="nombre">Nombre del Dragón:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Smaug">
                </div>

                <div class="campo">
                    <label for="correo">Correo del Guardián:</label>
                    <input type="email" id="correo" name="correo" placeholder="guardian@reino.com">
                </div>

                <div class="campo">
                    <label for="tipo">Tipo de Dragón:</label>
                    <select id="tipo" name="tipo">
                        <option value="Fuego">🔥 Dragón de Fuego</option>
                        <option value="Hielo">❄️ Dragón de Hielo</option>
                        <option value="Celestial">✨ Dragón Celestial</option>
                        <option value="Sombra">🌑 Dragón de Sombra</option>
                        <option value="Ancestral">👑 Dragón Ancestral</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="mensaje">Descripción del Dragón:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Describe sus habilidades, temperamento o historia..."></textarea>
                </div>

                <div class="botones">
                    <button type="submit" id="btnEnviar">Registrar</button>
                    <button type="button" id="btnLimpiar">Limpiar</button>
                </div>
            </form>

            <p id="mensajeError"></p>
        </div>

        <div class="lista">
            <h3>📜 Dragones Registrados</h3>
            <ul id="listaDragones"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
